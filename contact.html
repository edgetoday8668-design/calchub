<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – CalcHub</title>
  <meta name="description" content="Contact the CalcHub team. Send us feedback, report an error, or suggest a new calculator." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--accent:#f59e0b;--accent2:#fbbf24;--text:#f0f0f0;--muted:#8b90a7;--border:#2e3347;--radius:14px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
    nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{font-family:'Sora',sans-serif;font-weight:800;font-size:1.2rem;color:var(--accent);text-decoration:none}
    .logo span{color:var(--text)}
    nav ul{list-style:none;display:flex;gap:24px}
    nav ul a{color:var(--muted);text-decoration:none;font-size:.9rem}
    nav ul a:hover{color:var(--text)}
    .hero{text-align:center;padding:70px 24px 50px;max-width:600px;margin:0 auto}
    h1{font-family:'Sora',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;line-height:1.15;margin-bottom:14px}
    h1 em{font-style:normal;color:var(--accent)}
    .hero p{color:var(--muted);font-size:1.05rem}
    .form-wrap{max-width:560px;margin:0 auto;padding:0 24px 80px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px}
    .field{margin-bottom:20px}
    label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:7px;font-weight:500}
    input[type=text],input[type=email],textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color .2s}
    input[type=text]:focus,input[type=email]:focus,textarea:focus{border-color:var(--accent)}
    textarea{resize:vertical;min-height:130px}
    select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;cursor:pointer;appearance:none}
    select:focus{border-color:var(--accent)}
    .submit-btn{width:100%;padding:15px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s;margin-top:4px}
    .submit-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,158,11,.25)}
    .success{display:none;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:24px;text-align:center;margin-top:20px}
    .success .icon{font-size:2rem;margin-bottom:10px}
    .success h3{font-family:'Sora',sans-serif;font-weight:700;margin-bottom:8px}
    .success p{color:var(--muted);font-size:.9rem}
    footer{background:var(--surface);border-top:1px solid var(--border);text-align:center;padding:28px 24px;color:var(--muted);font-size:.85rem}
    footer a{color:var(--muted);text-decoration:none;margin:0 10px}
    @media(max-width:640px){nav ul{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="/index.html" class="logo">Calc<span>Hub</span></a>
  <ul><li><a href="/index.html">Home</a></li><li><a href="/about.html">About</a></li><li><a href="/privacy-policy.html">Privacy</a></li></ul>
</nav>
<header class="hero">
  <h1>Get in <em>Touch</em></h1>
  <p>Found an error? Have a suggestion for a new calculator? We'd love to hear from you.</p>
</header>
<div class="form-wrap">
  <div class="card">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="John Smith" />
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@email.com" />
    </div>
    <div class="field">
      <label>Subject</label>
      <select id="subject">
        <option value="">Select a topic...</option>
        <option value="error">Report a calculation error</option>
        <option value="suggestion">Suggest a new calculator</option>
        <option value="feedback">General feedback</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Tell us what's on your mind..."></textarea>
    </div>
    <button class="submit-btn" onclick="submitForm()">Send Message →</button>
  </div>
  <div class="success" id="success">
    <div class="icon">✅</div>
    <h3>Message Received!</h3>
    <p>Thanks for reaching out. We'll get back to you as soon as possible.</p>
  </div>
</div>
<footer>
  <p style="margin-bottom:10px;">© 2025 CalcHub · Free Online Calculators</p>
  <div><a href="/privacy-policy.html">Privacy Policy</a><a href="/about.html">About</a><a href="/contact.html">Contact</a></div>
</footer>
<script>
  function submitForm(){
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const message=document.getElementById('message').value.trim();
    if(!name||!email||!message){alert('Please fill in your name, email, and message.');return;}
    if(!email.includes('@')){alert('Please enter a valid email address.');return;}
    document.querySelector('.card').style.display='none';
    document.getElementById('success').style.display='block';
  }
</script>
</body>
</html>
